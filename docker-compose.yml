services:
  # --- SLOTMACHINE ---
  slotmachine-service:
    build:
      context: ./slotmachine-service
      dockerfile: Dockerfile
    container_name: slotmachine-app
    ports:
      - "8082:8082"
    depends_on:
      slotmachine-db:
        condition: service_healthy
      banking-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://slotmachine-db:5432/slotmachine_db
      SPRING_DATASOURCE_USERNAME: slotmachine
      SPRING_DATASOURCE_PASSWORD: passwort
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      BANKING_SERVICE_URL: http://banking-app:8080
    networks:
      - casino_network
    restart: unless-stopped

  slotmachine-db:
    image: postgres:16
    container_name: slotmachine-db
    restart: always
    ports:
      - "5433:5432" # Host-Port 5433
    environment:
      POSTGRES_DB: slotmachine_db
      POSTGRES_USER: slotmachine
      POSTGRES_PASSWORD: passwort
    volumes:
      - slotmachine_data:/var/lib/postgresql/data
    networks:
      - casino_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U slotmachine" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- ROULETTE ---
  roulette-service:
    build:
      context: ./roulette-service
      dockerfile: Dockerfile
    container_name: roulette-app
    ports:
      - "8081:8081"
    depends_on:
      roulette-db:
        condition: service_healthy
      banking-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://roulette-db:5432/roulette_db
      SPRING_DATASOURCE_USERNAME: roulette
      SPRING_DATASOURCE_PASSWORD: passwort
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      BANKING_SERVICE_URL: http://banking-app:8080
    networks:
      - casino_network
    restart: unless-stopped

  roulette-db:
    image: postgres:16
    container_name: roulette-db
    environment:
      POSTGRES_DB: roulette_db
      POSTGRES_USER: roulette
      POSTGRES_PASSWORD: passwort
    ports:
      - "5434:5432"
    volumes:
      - roulette_data:/var/lib/postgresql/data
    networks:
      - casino_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U roulette" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BANKING ---
  banking-service:
    build:
      context: ./banking-service
      dockerfile: Dockerfile
    container_name: banking-app
    ports:
      - "8080:8080"
    depends_on:
      banking-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://banking-db:5432/banking_db
      SPRING_DATASOURCE_USERNAME: banking
      SPRING_DATASOURCE_PASSWORD: passwort
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      BANKING_SERVICE_URL: http://banking-app:8080/casino/bank
    networks:
      - casino_network
    restart: unless-stopped

  banking-db:
    image: postgres:16
    container_name: banking-db
    restart: always
    environment:
      POSTGRES_DB: banking_db
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: passwort
    ports:
      - "5435:5432"
    volumes:
      - banking_data:/var/lib/postgresql/data
    networks:
      - casino_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U banking" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  casino_network:

volumes:
  slotmachine_data:
  roulette_data:
  banking_data: